version: 2

models:
  - name: dim_restaurants
    description: "Deduplicated restaurant dimension with a calculated popularity_score."
    columns:
      - name: id
        tests:
          - unique
          - not_null
      - name: rating
        tests:
          - not_null
      - name: popularity_score
        tests:
          - not_null
      - name: is_closed
        tests:
          - not_null
      - name: city
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('known_la_cities')
                field: city
              config:
                severity: warn

  - name: fct_restaurant_hours
    description: "One row per restaurant per open time period, exploded from dim_restaurants.business_hours."
    columns:
      - name: restaurant_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_restaurants')
                field: id
      - name: day_of_week
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [0, 1, 2, 3, 4, 5, 6]
                quote: false
